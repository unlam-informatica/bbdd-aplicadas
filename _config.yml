lang: es-ES
timezone: America/Argentina/Buenos_Aires

title: Bases de Datos Aplicadas
tagline: Apuntes, guías y ejercicios — UNLaM
description: >-
  Apuntes, guías de referencia y ejercicios prácticos para la cursada de
  Bases de Datos Aplicadas en UNLaM, organizados por unidad.

url: "https://unlam-informatica.github.io"
baseurl: "/bbdd-aplicadas"

github:
  username: unlam-informatica

social:
  name: Marcos Rios
  email: mrios.dev@gmail.com
  links:
    - https://github.com/unlam-informatica

theme: jekyll-theme-chirpy

toc: true

comments:
  active: ""

pwa:
  enabled: false

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: development

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - LICENSE
  - vendor

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
