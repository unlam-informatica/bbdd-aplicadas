lang: es-ES
timezone: America/Argentina/Buenos_Aires

title: Bases de Datos Aplicadas
tagline: Apuntes, guías y ejercicios — UNLaM
description: >-
  Apuntes, guías de referencia y ejercicios prácticos para la cursada de
  Bases de Datos Aplicadas en UNLaM, organizados por unidad.

url: "https://unlam-informatica.github.io"
baseurl: "/bbdd-aplicadas"

github:
  username: unlam-informatica

social:
  name: Marcos Rios
  email: mrios.dev@gmail.com
  links:
    - https://github.com/unlam-informatica

webmaster_verifications:
  google:
  bing:

analytics:
  google:
    id:

theme: jekyll-theme-chirpy

theme_mode: # [light | dark]

avatar:
toc: true

comments:
  provider: # [disqus | utterances | giscus]
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - CLAUDE.md
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
